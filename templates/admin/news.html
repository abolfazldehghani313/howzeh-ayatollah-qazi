<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">

<title>مدیریت اخبار</title>

<style>

body{
    font-family:Tahoma;
    background:#f4f4f4;
    margin:40px;
}

form{
    background:white;
    padding:20px;
    border-radius:10px;
    margin-bottom:30px;
    box-shadow:0 0 10px #ddd;
}

input,textarea{
    width:100%;
    padding:10px;
    margin:10px 0;
    box-sizing:border-box;
}

button{
    background:#0b5d3b;
    color:white;
    border:none;
    padding:12px 25px;
    cursor:pointer;
    border-radius:5px;
}

button:hover{
    background:#08452c;
}

.news{
    background:white;
    padding:20px;
    margin-top:20px;
    border-radius:10px;
    box-shadow:0 0 10px #ddd;
}

.news img{
    width:250px;
    margin-top:10px;
    margin-bottom:15px;
    border-radius:8px;
}

h1{
    color:#0b5d3b;
}

.edit-btn{
    display:inline-block;
    background:#1976d2;
    color:white;
    padding:10px 18px;
    text-decoration:none;
    border-radius:5px;
    margin-left:10px;
}

.edit-btn:hover{
    background:#125ea8;
}

.delete-btn{
    display:inline-block;
    background:#d32f2f;
    color:white;
    padding:10px 18px;
    text-decoration:none;
    border-radius:5px;
}

.delete-btn:hover{
    background:#b71c1c;
}

</style>

</head>

<body>

<h1>مدیریت اخبار</h1>

<form method="POST" enctype="multipart/form-data">

<label>عنوان خبر</label>

<input
type="text"
name="title"
required>

<label>متن خبر</label>

<textarea
name="text"
rows="6"
required></textarea>

<label>عکس خبر</label>

<input
type="file"
name="image">

<br><br>

<button type="submit">
ثبت خبر
</button>

</form>

<hr>

<h2>اخبار ثبت شده</h2>

{% if news %}

{% for item in news %}

<div class="news">

<h3>{{ item.title }}</h3>

<p>{{ item.text }}</p>

{% if item.image %}

<img src="{{ url_for('static', filename='uploads/news/' + item.image) }}">

{% endif %}

<br>

<a class="edit-btn"
href="/admin/news/edit/{{ item.id }}">

✏️ ویرایش

</a>

<a class="delete-btn"
href="/admin/news/delete/{{ item.id }}"
onclick="return confirm('آیا از حذف این خبر مطمئن هستید؟');">

🗑️ حذف

</a>

</div>

{% endfor %}

{% else %}

<p>هنوز خبری ثبت نشده است.</p>

{% endif %}

</body>

</html>
