<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">

<title>تماس با ما</title>

<style>

body{
    font-family:Tahoma;
    background:#f5f5f5;
    margin:0;
}

header{
    background:#0b5d3b;
    color:white;
    text-align:center;
    padding:20px;
}

nav{
    background:#c9a227;
    padding:15px;
    text-align:center;
}

nav a{
    color:white;
    text-decoration:none;
    margin:15px;
    font-weight:bold;
}

.container{
    width:70%;
    margin:30px auto;
    background:white;
    padding:30px;
    border-radius:8px;
}

input,textarea{
    width:100%;
    padding:10px;
    margin:10px 0;
    font-size:16px;
    box-sizing:border-box;
}

button{
    background:#0b5d3b;
    color:white;
    border:none;
    padding:12px 25px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#08452c;
}

.success{
    background:#d4edda;
    color:#155724;
    padding:15px;
    margin-bottom:20px;
    border-radius:6px;
}

footer{
    background:#0b5d3b;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:40px;
}

</style>

</head>

<body>

<header>
<h1>تماس با حوزه علمیه آیت‌الله قاضی</h1>
</header>

<nav>
<a href="/">صفحه اصلی</a>
<a href="/about">درباره حوزه</a>
<a href="/news">اخبار</a>
<a href="/calendar">تقویم آموزشی</a>
<a href="/contact">تماس با ما</a>
<a href="/login">ورود مدیر</a>
</nav>

<div class="container">

<h2>فرم تماس</h2>

{% if success %}
<div class="success">
{{ success }}
</div>
{% endif %}

<form method="POST">

<input
type="text"
name="fullname"
placeholder="نام و نام خانوادگی"
required>

<input
type="text"
name="phone"
placeholder="شماره تماس">

<input
type="text"
name="subject"
placeholder="موضوع"
required>

<textarea
name="text"
rows="6"
placeholder="متن پیام"
required></textarea>

<button type="submit">
ارسال پیام
</button>

</form>

</div>

<footer>

تمامی حقوق محفوظ است © حوزه علمیه آیت‌الله قاضی

</footer>

</body>

</html>
