<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">

<title>تقویم آموزشی</title>

<style>

body{
    font-family:Tahoma;
    background:#f5f5f5;
    margin:40px;
}

h1{
    color:#0b5d3b;
    text-align:center;
}

.card{
    background:white;
    padding:20px;
    margin:20px auto;
    width:80%;
    border-radius:10px;
    box-shadow:0 0 10px #ddd;
}

.card h2{
    color:#0b5d3b;
}

</style>

</head>

<body>

<h1>تقویم آموزشی</h1>

{% if events %}

{% for item in events %}

<div class="card">

<h2>{{ item.title }}</h2>

<p><b>تاریخ:</b> {{ item.date }}</p>

<p><b>ساعت:</b> {{ item.time }}</p>

<p><b>مکان:</b> {{ item.place }}</p>

<p>{{ item.description }}</p>

</div>

{% endfor %}

{% else %}

<p style="text-align:center;">
هنوز برنامه‌ای ثبت نشده است.
</p>

{% endif %}

</body>

</html>
