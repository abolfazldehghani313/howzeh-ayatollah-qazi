<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">

<title>ورود مدیر</title>

<style>

body{
    font-family:Tahoma;
    background:#f5f5f5;
}

.login-box{
    width:400px;
    margin:80px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 15px #ccc;
}

h2{
    text-align:center;
    color:#0b5d3b;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    background:#0b5d3b;
    color:white;
    border:none;
    cursor:pointer;
    border-radius:5px;
}

button:hover{
    background:#08452c;
}

.error{
    color:red;
    text-align:center;
    margin-bottom:10px;
}

</style>

</head>

<body>

<div class="login-box">

<h2>ورود مدیر</h2>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

<form method="POST">

<input
type="text"
name="username"
placeholder="نام کاربری"
required>

<input
type="password"
name="password"
placeholder="رمز عبور"
required>

<button type="submit">
ورود
</button>

</form>

</div>

</body>

</html>
